
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
  <header>
    <nav>
    <ul>
      <li><a href="kov.spec.html">Köveletmény specifikáció</a></li>
      <li><a href="bejelentkezes.html">Bejelentkezes</a></li>
      <li><a href="naptar.html">Naptár</a></li>
      <li><a href="index.html">Index</a></li>
      <li><a href="regisztracio.html">Regisztracio</a></li>
    </ul>
  </nav>
  </header>
    <div class="login-container">
  <h2>Bejelentkezés</h2>
  <form>
    <div class="form-group">
      <label for="username">Felhasználónév</label>
      <input type="text" id="username" name="username" required>
    </div>

    <div class="form-group">
      <label for="password">Jelszó</label>
      <input type="password" id="password" name="password" required>
    </div>

    <button type="submit">Belépés</button>
  </form>
</div>


</body>
<script>
  const form = document.querySelector("form");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });

    const data = await res.json();

    if (data.token) {
      // 🔐 Token mentése
      localStorage.setItem("token", data.token);
      alert("Sikeres bejelentkezés!");

      // 👉 Itt hívhatod meg a védett végpontot
      loadProfile();
    } else {
      alert("Hibás adatok!");
    }
  });

  async function loadProfile() {
    const token = localStorage.getItem("token");
    if (!token) {
      alert("Nincs token, előbb jelentkezz be!");
      return;
    }

    const res = await fetch("/profile", {
      headers: { "Authorization": `Bearer ${token}` }
    });

    const profileData = await res.json();
    console.log(profileData);

    // Példa: megjelenítés az oldalon
    document.body.innerHTML += `<p>Felhasználó: ${profileData.user.email}</p>`;
  }
</script>

</html>


<!--
Form mezők
req.body.username → Felhasználónév

req.body.password → Jelszó

Gomb:

<button type="submit">Belépés</button>

-->
