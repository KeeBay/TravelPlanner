<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Eseménynaptár</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">
  <link rel="stylesheet" href="style.css">
 
</head>
<body>
  <header>
    <nav>
      <ul>
        <li><a href="kov.spec.html">Követelmény specifikáció</a></li>
        <li><a href="bejelentkezes.html">Bejelentkezés</a></li>
        <li><a href="naptar.html">Naptár</a></li>
        <li><a href="index.html">Index</a></li>
        <li><a href="regisztracio.html">Regisztráció</a></li>
      </ul>
    </nav>
  </header>

  <div id="calendar"></div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  <script>
    
    function loadEventsFromXML(xmlText) {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "application/xml");
      const eventNodes = xmlDoc.getElementsByTagName("event");
      const events = [];

      for (let i = 0; i < eventNodes.length; i++) {
        const event = eventNodes[i];
        events.push({
          title: event.getElementsByTagName("title")[0].textContent,
          start: event.getElementsByTagName("start")[0].textContent,
          end: event.getElementsByTagName("end")[0].textContent
        });
      }

      return events;
    }

    
    fetch('esemenyek.xml')
      .then(response => response.text())
      .then(xmlText => {
        const events = loadEventsFromXML(xmlText);

        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
          initialView: 'dayGridMonth',
          locale: 'hu',
          firstDay: 1, 
          headerToolbar: {
            left: 'prevYear,prev,today,next,nextYear',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
          },
          events: events
        });

        calendar.render();
      })
      .catch(err => {
        console.error("Hiba az események betöltésekor:", err);
      });
  </script>
</body>
</html>
