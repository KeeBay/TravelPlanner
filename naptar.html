<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <title>Eseménynaptár</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
  
  
</head>
<body>
  <header>
    <nav>
    <ul>
      <li><a href="kov.spec.html">Köveletmény specifikáció</a></li>
      <li><a href="bejelentkezes.html">Bejelentkezes</a></li>
      <li><a href="naptar.html">Naptár</a></li>
      <li><a href="index.html">index</a></li>
      <li><a href="regisztracio.html">Regisztracio</a></li>
    </ul>
  </nav>
  </header>

  
  <div id="calendar"></div>

  <script>
    // XML → JSON átalakítás
    function loadEventsFromXML(xmlText) {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "application/xml");
      const eventNodes = xmlDoc.getElementsByTagName("event");
      const events = [];

      for (let i = 0; i < eventNodes.length; i++) {
        const event = eventNodes[i];
        events.push({
          title: event.getElementsByTagName("title")[0].textContent,
          start: event.getElementsByTagName("start")[0].textContent,
          end: event.getElementsByTagName("end")[0].textContent
        });
      }

      return events;
    }

    // XML betöltése és naptár inicializálása
    fetch('esemenyek.xml')
      .then(response => response.text())
      .then(xmlText => {
        const events = loadEventsFromXML(xmlText);

        const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
          initialView: 'dayGridMonth',
          locale: 'hu',
          headerToolbar: {
            left: 'prevYear,prev,today,next,nextYear',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
          },
          events: events
        });

        calendar.render();
      });
  </script>

</body>
</html>
